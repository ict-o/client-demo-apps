<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>デモ一覧 | client-demo-apps</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
        background: #f5f5f7;
        color: #1d1d1f;
        min-height: 100vh;
        padding: 48px 24px 80px;
      }

      .container {
        max-width: 720px;
        margin: 0 auto;
      }

      header {
        margin-bottom: 40px;
      }

      header h1 {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.5px;
      }

      header p {
        margin-top: 8px;
        font-size: 14px;
        color: #6e6e73;
      }

      .demo-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .demo-card {
        background: #fff;
        border-radius: 14px;
        padding: 24px 28px;
        text-decoration: none;
        color: inherit;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        box-shadow: 0 1px 4px rgba(0,0,0,.08);
        transition: box-shadow 0.15s, transform 0.15s;
      }

      .demo-card:hover {
        box-shadow: 0 6px 20px rgba(0,0,0,.12);
        transform: translateY(-2px);
      }

      .demo-card:active {
        transform: translateY(0);
        box-shadow: 0 1px 4px rgba(0,0,0,.08);
      }

      .demo-info {
        flex: 1;
        min-width: 0;
      }

      .demo-title {
        font-size: 17px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .demo-slug {
        font-size: 12px;
        color: #8e8e93;
        font-family: "SF Mono", "Consolas", monospace;
        margin-bottom: 8px;
      }

      .demo-desc {
        font-size: 13px;
        color: #6e6e73;
        line-height: 1.6;
      }

      .demo-arrow {
        font-size: 20px;
        color: #c7c7cc;
        flex-shrink: 0;
      }

      footer {
        margin-top: 48px;
        text-align: center;
        font-size: 12px;
        color: #aeaeb2;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>デモ一覧</h1>
        <p>各デモへのリンクです。カードをクリックして確認できます。</p>
      </header>

      <div class="demo-list">

        <a class="demo-card" href="./bridal-estimate-demo/">
          <div class="demo-info">
            <div class="demo-title">ブライダル見積作成システム</div>
            <div class="demo-slug">bridal-estimate-demo</div>
            <div class="demo-desc">
              ブライダル事業向けの見積作成デモ。選択式ウィザードによる新規見積作成・明細編集・顧客向け見積書プレビュー・PDF出力モーダルを体験できます。
            </div>
          </div>
          <span class="demo-arrow">›</span>
        </a>

        <a class="demo-card" href="./print-estimate-demo/">
          <div class="demo-info">
            <div class="demo-title">印刷見積標準化支援システム</div>
            <div class="demo-slug">print-estimate-demo</div>
            <div class="demo-desc">
              印刷会社向けの見積標準化・標準価格算出支援デモ。CSV 取込データをもとに見積算出フローを確認できます。
            </div>
          </div>
          <span class="demo-arrow">›</span>
        </a>

      </div>

      <footer>
        架空データを使用したデモ環境です。実在する顧客・案件情報は含まれていません。
      </footer>
    </div>
  </body>
</html>
