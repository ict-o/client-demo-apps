<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理画面 | 標準価格算出デモ</title>
    <meta name="description" content="標準価格算出デモの管理画面。プルダウン選択肢マスタと単価マスタを管理します。" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --color-bg: #F8FAFC;
        --color-surface: #FFFFFF;
        --color-border: #D8DEE9;
        --color-border-soft: #E8EDF3;
        --color-text: #1A1F2B;
        --color-text-sub: #64748B;
        --color-primary: #1C3FAA;
        --color-primary-hover: #16318A;
        --color-accent: #2F80ED;
        --color-success-bg: #ECFDF5;
        --color-success-text: #138A63;
        --color-error-bg: #FEF2F2;
        --color-error-text: #DC2626;
        --radius: 10px;
        --shadow: 0 1px 4px rgba(15, 23, 42, 0.08);
      }

      html, body {
        min-height: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
        background: var(--color-bg);
        color: var(--color-text);
      }

      button, input {
        font-family: inherit;
      }

      a { color: var(--color-accent); }

      /* ── ログイン画面 ── */
      #login-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }

      .login-card {
        background: var(--color-surface);
        border-radius: 18px;
        padding: 40px 36px;
        width: 100%;
        max-width: 360px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, .10);
        text-align: center;
      }

      .login-card h2 {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .login-card p {
        font-size: 13px;
        color: var(--color-text-sub);
        margin-bottom: 28px;
      }

      .login-field {
        position: relative;
        margin-bottom: 12px;
      }

      .login-field input {
        width: 100%;
        min-height: 44px;
        padding: 12px 44px 12px 16px;
        border: 1.5px solid var(--color-border);
        border-radius: 10px;
        font-size: 15px;
        outline: none;
        transition: border-color 0.15s;
        background: #fafafa;
      }

      .login-field input:focus-visible {
        border-color: var(--color-accent);
        background: #fff;
        box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.15);
      }

      .login-field input.error {
        border-color: var(--color-error-text);
      }

      .toggle-pw {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #94A3B8;
        font-size: 16px;
        line-height: 1;
        padding: 10px;
        min-width: 44px;
        min-height: 44px;
      }

      .toggle-pw:hover { color: var(--color-text-sub); }
      .toggle-pw:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; border-radius: 6px; }

      .error-msg {
        font-size: 12px;
        color: var(--color-error-text);
        margin-bottom: 14px;
        min-height: 16px;
        text-align: left;
      }

      .login-btn {
        width: 100%;
        min-height: 44px;
        padding: 13px;
        background: var(--color-primary);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }

      .login-btn:hover { background: var(--color-primary-hover); }
      .login-btn:active { background: #10245e; }
      .login-btn:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }

      .login-back {
        display: inline-block;
        margin-top: 20px;
        font-size: 13px;
        color: var(--color-text-sub);
        text-decoration: none;
      }
      .login-back:hover { color: var(--color-accent); }

      /* ── 管理画面 ── */
      #admin-content { display: none; min-height: 100vh; }

      .admin-header {
        background: var(--color-surface);
        border-bottom: 1px solid var(--color-border-soft);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        row-gap: 10px;
        gap: 16px;
      }

      .admin-header h1 {
        font-size: 17px;
        font-weight: 700;
      }

      .admin-header .sub {
        font-size: 12px;
        color: var(--color-text-sub);
        margin-top: 2px;
      }

      .admin-user {
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 13px;
        color: var(--color-text-sub);
        flex-wrap: wrap;
      }

      .admin-user strong { color: var(--color-text); font-weight: 600; }

      .link-btn {
        background: none;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        padding: 8px 14px;
        min-height: 40px;
        font-size: 13px;
        color: var(--color-text);
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        transition: background 0.15s, border-color 0.15s;
      }
      .link-btn:hover { background: var(--color-bg); border-color: #C2CBDA; }
      .link-btn:active { background: #EEF2F7; }
      .link-btn:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }

      .admin-main {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px 20px 80px;
      }

      .notice {
        background: #EEF6FF;
        border: 1px solid #C7D8F5;
        color: #1C3FAA;
        border-radius: var(--radius);
        padding: 12px 16px;
        font-size: 12.5px;
        line-height: 1.6;
        margin-bottom: 20px;
      }

      /* ── タブ ── */
      .tabs {
        display: flex;
        gap: 4px;
        border-bottom: 1px solid var(--color-border-soft);
        margin-bottom: 20px;
      }

      .tab-btn {
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        padding: 12px 16px;
        min-height: 44px;
        font-size: 14px;
        font-weight: 600;
        color: var(--color-text-sub);
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s;
      }

      .tab-btn:hover { color: var(--color-text); }
      .tab-btn:focus-visible { outline: 2px solid var(--color-accent); outline-offset: -2px; }

      .tab-btn.active {
        color: var(--color-primary);
        border-bottom-color: var(--color-primary);
      }

      .tab-panel { display: none; }
      .tab-panel.active { display: block; }

      /* ── カード / セクション ── */
      .card {
        background: var(--color-surface);
        border: 1px solid var(--color-border-soft);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        margin-bottom: 20px;
      }

      .card-header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--color-border-soft);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
      }

      .card-header h2 {
        font-size: 14px;
        font-weight: 700;
      }

      .card-body { padding: 18px 20px; }

      .field-label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--color-text-sub);
        margin-bottom: 6px;
      }

      select, .text-input {
        width: 100%;
        min-height: 44px;
        padding: 9px 12px;
        border: 1.5px solid var(--color-border);
        border-radius: 8px;
        font-size: 14px;
        background: #fff;
        color: var(--color-text);
        outline: none;
        transition: border-color 0.15s;
      }

      select:focus-visible, .text-input:focus-visible {
        border-color: var(--color-accent);
        box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.15);
      }

      .category-picker {
        max-width: 320px;
        margin-bottom: 18px;
      }

      /* ── テーブル ── */
      .table-wrap { overflow-x: auto; }

      table { width: 100%; border-collapse: collapse; font-size: 13.5px; }

      thead th {
        text-align: left;
        padding: 10px 12px;
        background: #F1F5F9;
        color: #475569;
        font-weight: 600;
        white-space: nowrap;
        border-bottom: 1px solid var(--color-border);
      }

      tbody td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--color-border-soft);
        vertical-align: middle;
      }

      tbody tr:hover { background: #FAFBFD; }

      .col-right { text-align: right; }
      .col-actions { text-align: right; white-space: nowrap; }

      .cell-input {
        width: 100%;
        min-width: 100px;
        min-height: 38px;
        padding: 6px 10px;
        border: 1.5px solid var(--color-accent);
        border-radius: 6px;
        font-size: 13.5px;
        outline: none;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 7px 14px;
        border-radius: 7px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid transparent;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }

      .btn:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }

      .btn-primary { background: var(--color-primary); color: #fff; }
      .btn-primary:hover { background: var(--color-primary-hover); }
      .btn-primary:active { background: #10245e; }

      .btn-outline { background: #fff; border-color: var(--color-border); color: var(--color-text); }
      .btn-outline:hover { background: var(--color-bg); border-color: #C2CBDA; }
      .btn-outline:active { background: #EEF2F7; }

      .btn-ghost { background: none; border-color: transparent; color: var(--color-text-sub); }
      .btn-ghost:hover { background: var(--color-bg); color: var(--color-text); }

      .btn + .btn { margin-left: 6px; }

      /* ── 追加フォーム ── */
      .add-form {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: flex-end;
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px dashed var(--color-border);
      }

      .add-form .field { flex: 1 1 180px; min-width: 160px; }

      .form-error {
        width: 100%;
        font-size: 12.5px;
        color: var(--color-error-text);
        background: var(--color-error-bg);
        border: 1px solid #FCA5A5;
        border-radius: 8px;
        padding: 8px 12px;
        display: none;
      }
      .form-error.show { display: block; }

      /* ── トースト ── */
      #toast {
        position: fixed;
        left: 50%;
        bottom: 28px;
        transform: translate(-50%, 20px);
        min-width: 220px;
        max-width: 90vw;
        padding: 13px 20px;
        border-radius: 10px;
        font-size: 13.5px;
        font-weight: 600;
        text-align: center;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.18s ease, transform 0.18s ease;
        z-index: 100;
      }

      #toast.show { opacity: 1; transform: translate(-50%, 0); }
      #toast.toast-success { background: var(--color-success-bg); color: var(--color-success-text); border: 1px solid #A7F3D0; }
      #toast.toast-error { background: var(--color-error-bg); color: var(--color-error-text); border: 1px solid #FCA5A5; }

      @media (max-width: 600px) {
        .admin-header { padding: 14px 16px; }
        .admin-main { padding: 18px 14px 72px; }
        .add-form .field { flex: 1 1 100%; }
      }
    </style>
  </head>
  <body>

    <!-- ログイン画面 -->
    <div id="login-screen">
      <div class="login-card">
        <h2>管理画面ログイン</h2>
        <p>標準価格算出デモの管理画面です。管理者パスワードを入力してください。</p>
        <div class="login-field">
          <input type="password" id="pw-input" placeholder="管理者パスワード" autocomplete="current-password" aria-label="管理者パスワード" />
          <button class="toggle-pw" type="button" id="toggle-pw" aria-label="パスワードを表示">
            &#128065;
          </button>
        </div>
        <div class="error-msg" id="error-msg" role="alert"></div>
        <button class="login-btn" id="login-btn">ログイン</button>
        <a class="login-back" href="./index.html">← 見積画面に戻る</a>
      </div>
    </div>

    <!-- 管理画面本体 -->
    <div id="admin-content">
      <div class="admin-header">
        <div>
          <h1>標準価格算出デモ　管理画面</h1>
          <div class="sub">プルダウン選択肢マスタ・単価マスタの管理</div>
        </div>
        <div class="admin-user">
          <span>ログイン中：<strong>向井 美咲</strong>（価格管理担当）</span>
          <a class="link-btn" href="./index.html">← 見積画面に戻る</a>
          <button class="link-btn" id="logout-btn" type="button">ログアウト</button>
        </div>
      </div>

      <div class="admin-main">
        <div class="notice">
          この管理画面で登録した内容は、ブラウザ内（このデバイス）に保存されます。見積画面の算出ロジックは本デモの対象外のため、ここでの変更は算出結果には反映されません。
        </div>

        <div class="tabs" role="tablist">
          <button class="tab-btn active" id="tab-btn-pulldown" role="tab" aria-selected="true" aria-controls="tab-panel-pulldown" type="button">プルダウン選択肢マスタ</button>
          <button class="tab-btn" id="tab-btn-price" role="tab" aria-selected="false" aria-controls="tab-panel-price" type="button">単価マスタ</button>
        </div>

        <!-- プルダウン選択肢マスタ -->
        <div class="tab-panel active" id="tab-panel-pulldown" role="tabpanel">
          <div class="card">
            <div class="card-header">
              <h2>選択肢の追加・修正</h2>
            </div>
            <div class="card-body">
              <div class="category-picker">
                <label class="field-label" for="category-select">対象のプルダウン</label>
                <select id="category-select"></select>
              </div>

              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>表示名</th>
                      <th>値</th>
                      <th class="col-actions">操作</th>
                    </tr>
                  </thead>
                  <tbody id="option-tbody"></tbody>
                </table>
              </div>

              <form class="add-form" id="add-option-form" novalidate>
                <div class="form-error" id="add-option-error" role="alert"></div>
                <div class="field">
                  <label class="field-label" for="add-option-label">表示名</label>
                  <input type="text" id="add-option-label" class="text-input" placeholder="例）光沢紙" />
                </div>
                <div class="field">
                  <label class="field-label" for="add-option-value">値</label>
                  <input type="text" id="add-option-value" class="text-input" placeholder="例）光沢紙" />
                </div>
                <button type="submit" class="btn btn-primary">＋ 選択肢を追加</button>
              </form>
            </div>
          </div>
        </div>

        <!-- 単価マスタ -->
        <div class="tab-panel" id="tab-panel-price" role="tabpanel">
          <div class="card">
            <div class="card-header">
              <h2>基準単価（1部あたり）の修正</h2>
            </div>
            <div class="card-body">
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>品目</th>
                      <th class="col-right">基準単価</th>
                      <th class="col-actions">操作</th>
                    </tr>
                  </thead>
                  <tbody id="price-tbody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="toast" role="status" aria-live="polite"></div>

    <script>
      (function () {
        'use strict';

        /* ═══════════════════ 認証 ═══════════════════ */
        var AUTH_KEY = 'spd_admin_auth';
        var PW_HASH = '6051fc84a7a0d74c225fb18a496b09952da5642e60723ecae543298edd7d82d6';

        function showAdmin() {
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('admin-content').style.display = 'block';
          initAdmin();
        }

        if (sessionStorage.getItem(AUTH_KEY) === '1') {
          showAdmin();
        } else {
          var pwInput   = document.getElementById('pw-input');
          var errMsg    = document.getElementById('error-msg');
          var loginBtn  = document.getElementById('login-btn');
          var toggleBtn = document.getElementById('toggle-pw');

          var attemptLogin = function () {
            var encoded = new TextEncoder().encode(pwInput.value);
            crypto.subtle.digest('SHA-256', encoded).then(function (buf) {
              var hex = Array.from(new Uint8Array(buf)).map(function (b) {
                return b.toString(16).padStart(2, '0');
              }).join('');

              if (hex === PW_HASH) {
                sessionStorage.setItem(AUTH_KEY, '1');
                showAdmin();
              } else {
                pwInput.classList.add('error');
                errMsg.textContent = 'パスワードが正しくありません';
                pwInput.value = '';
                pwInput.focus();
              }
            });
          };

          loginBtn.addEventListener('click', attemptLogin);
          pwInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') attemptLogin();
            pwInput.classList.remove('error');
            errMsg.textContent = '';
          });
          toggleBtn.addEventListener('click', function () {
            pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
          });
          pwInput.focus();
        }

        /* ═══════════════════ マスタデータ ═══════════════════ */
        var STORAGE_KEY = 'standard-price-demo:admin-master:v1';

        var CATEGORIES = [
          { key: 'printType',   label: '印刷物種別',   valueType: 'text' },
          { key: 'size',        label: 'サイズ',       valueType: 'text' },
          { key: 'paper',       label: '用紙',         valueType: 'text' },
          { key: 'color',       label: '色数',         valueType: 'text' },
          { key: 'quantity',    label: '部数',         valueType: 'number' },
          { key: 'process',     label: '加工',         valueType: 'text' },
          { key: 'expenseRate', label: '営業経費率',   valueType: 'number' }
        ];

        var DEFAULT_DATA = {
          pulldown: {
            printType: [
              { label: 'チラシ', value: 'チラシ' },
              { label: 'パンフレット', value: 'パンフレット' },
              { label: '名刺', value: '名刺' },
              { label: '封筒', value: '封筒' },
              { label: '冊子', value: '冊子' }
            ],
            size: [
              { label: 'A4', value: 'A4' },
              { label: 'A3', value: 'A3' },
              { label: 'B5', value: 'B5' },
              { label: 'B4', value: 'B4' },
              { label: '名刺サイズ', value: '名刺サイズ' }
            ],
            paper: [
              { label: '上質紙', value: '上質紙' },
              { label: 'コート紙', value: 'コート紙' },
              { label: 'マットコート紙', value: 'マットコート紙' },
              { label: '特殊紙', value: '特殊紙' }
            ],
            color: [
              { label: '片面1色', value: '片面1色' },
              { label: '片面4色', value: '片面4色' },
              { label: '両面4色', value: '両面4色' }
            ],
            quantity: [
              { label: '500部', value: 500 },
              { label: '1,000部', value: 1000 },
              { label: '3,000部', value: 3000 },
              { label: '5,000部', value: 5000 },
              { label: '10,000部', value: 10000 }
            ],
            process: [
              { label: 'なし', value: 'なし' },
              { label: '折り', value: '折り' },
              { label: 'PP加工', value: 'PP加工' },
              { label: '中綴じ', value: '中綴じ' },
              { label: '断裁', value: '断裁' }
            ],
            expenseRate: [
              { label: '10%', value: 10 },
              { label: '15%', value: 15 },
              { label: '20%', value: 20 }
            ]
          },
          priceMaster: [
            { id: 'PT-001', name: 'チラシ', unitPrice: 18 },
            { id: 'PT-002', name: 'パンフレット', unitPrice: 55 },
            { id: 'PT-003', name: '名刺', unitPrice: 35 },
            { id: 'PT-004', name: '封筒', unitPrice: 22 },
            { id: 'PT-005', name: '冊子', unitPrice: 180 }
          ]
        };

        function cloneDefault() {
          return JSON.parse(JSON.stringify(DEFAULT_DATA));
        }

        function loadData() {
          try {
            var raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return cloneDefault();
            var parsed = JSON.parse(raw);
            if (!parsed || !parsed.pulldown || !parsed.priceMaster) return cloneDefault();
            return parsed;
          } catch (e) {
            return cloneDefault();
          }
        }

        function saveData(data) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        var data = loadData();
        var currentCategoryKey = CATEGORIES[0].key;
        var editingOptionIndex = -1;
        var editingPriceId = null;

        /* ═══════════════════ ユーティリティ ═══════════════════ */
        function fmtYen(n) {
          return '¥' + Number(n).toLocaleString('ja-JP');
        }

        function escapeHtml(str) {
          return String(str).replace(/[&<>"']/g, function (c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
          });
        }

        var toastTimer = null;
        function showToast(message, isError) {
          var toast = document.getElementById('toast');
          toast.textContent = message;
          toast.className = 'toast show ' + (isError ? 'toast-error' : 'toast-success');
          if (toastTimer) clearTimeout(toastTimer);
          toastTimer = setTimeout(function () {
            toast.className = 'toast';
          }, 2600);
        }

        /* ═══════════════════ プルダウン選択肢マスタ ═══════════════════ */
        function getCategory(key) {
          for (var i = 0; i < CATEGORIES.length; i++) {
            if (CATEGORIES[i].key === key) return CATEGORIES[i];
          }
          return CATEGORIES[0];
        }

        function renderCategorySelect() {
          var select = document.getElementById('category-select');
          select.innerHTML = CATEGORIES.map(function (c) {
            return '<option value="' + c.key + '">' + escapeHtml(c.label) + '</option>';
          }).join('');
          select.value = currentCategoryKey;
        }

        function renderOptionTable() {
          var tbody = document.getElementById('option-tbody');
          var options = data.pulldown[currentCategoryKey] || [];

          if (options.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="padding:20px 12px;text-align:center;color:var(--color-text-sub);">この項目には選択肢が登録されていません</td></tr>';
            return;
          }

          tbody.innerHTML = options.map(function (opt, i) {
            if (i === editingOptionIndex) {
              return (
                '<tr>' +
                '<td><input type="text" class="cell-input" id="edit-option-label" value="' + escapeHtml(opt.label) + '" /></td>' +
                '<td><input type="text" class="cell-input" id="edit-option-value" value="' + escapeHtml(opt.value) + '" /></td>' +
                '<td class="col-actions">' +
                '<button type="button" class="btn btn-primary" data-action="save-option" data-index="' + i + '">保存</button>' +
                '<button type="button" class="btn btn-ghost" data-action="cancel-option">キャンセル</button>' +
                '</td>' +
                '</tr>'
              );
            }
            return (
              '<tr>' +
              '<td>' + escapeHtml(opt.label) + '</td>' +
              '<td>' + escapeHtml(opt.value) + '</td>' +
              '<td class="col-actions"><button type="button" class="btn btn-outline" data-action="edit-option" data-index="' + i + '">編集</button></td>' +
              '</tr>'
            );
          }).join('');
        }

        function parseValueForCategory(category, raw) {
          if (category.valueType === 'number') {
            var n = Number(String(raw).replace(/,/g, ''));
            if (!isFinite(n)) return { ok: false };
            return { ok: true, value: n };
          }
          var trimmed = String(raw).trim();
          if (trimmed === '') return { ok: false };
          return { ok: true, value: trimmed };
        }

        function isDuplicateLabel(options, label, excludeIndex) {
          for (var i = 0; i < options.length; i++) {
            if (i === excludeIndex) continue;
            if (options[i].label === label) return true;
          }
          return false;
        }

        function handleAddOption(e) {
          e.preventDefault();
          var category = getCategory(currentCategoryKey);
          var labelInput = document.getElementById('add-option-label');
          var valueInput = document.getElementById('add-option-value');
          var errorBox = document.getElementById('add-option-error');
          var label = labelInput.value.trim();
          var options = data.pulldown[currentCategoryKey];

          if (label === '') {
            errorBox.textContent = '表示名を入力してください';
            errorBox.classList.add('show');
            labelInput.focus();
            return;
          }

          var parsedValue = parseValueForCategory(category, valueInput.value);
          if (!parsedValue.ok) {
            errorBox.textContent = category.valueType === 'number' ? '値には数値を入力してください' : '値を入力してください';
            errorBox.classList.add('show');
            valueInput.focus();
            return;
          }

          if (isDuplicateLabel(options, label, -1)) {
            errorBox.textContent = '「' + label + '」は既に登録されています';
            errorBox.classList.add('show');
            labelInput.focus();
            return;
          }

          errorBox.classList.remove('show');
          options.push({ label: label, value: parsedValue.value });
          saveData(data);
          renderOptionTable();
          labelInput.value = '';
          valueInput.value = '';
          labelInput.focus();
          showToast('「' + label + '」を追加しました');
        }

        function handleOptionTableClick(e) {
          var btn = e.target.closest ? e.target.closest('button[data-action]') : null;
          if (!btn) return;
          var action = btn.getAttribute('data-action');

          if (action === 'edit-option') {
            editingOptionIndex = Number(btn.getAttribute('data-index'));
            renderOptionTable();
            var labelField = document.getElementById('edit-option-label');
            if (labelField) labelField.focus();
            return;
          }

          if (action === 'cancel-option') {
            editingOptionIndex = -1;
            renderOptionTable();
            return;
          }

          if (action === 'save-option') {
            var index = Number(btn.getAttribute('data-index'));
            var category = getCategory(currentCategoryKey);
            var options = data.pulldown[currentCategoryKey];
            var labelField = document.getElementById('edit-option-label');
            var valueField = document.getElementById('edit-option-value');
            var label = labelField.value.trim();

            if (label === '') {
              showToast('表示名を入力してください', true);
              labelField.focus();
              return;
            }

            var parsedValue = parseValueForCategory(category, valueField.value);
            if (!parsedValue.ok) {
              showToast(category.valueType === 'number' ? '値には数値を入力してください' : '値を入力してください', true);
              valueField.focus();
              return;
            }

            if (isDuplicateLabel(options, label, index)) {
              showToast('「' + label + '」は既に登録されています', true);
              labelField.focus();
              return;
            }

            options[index] = { label: label, value: parsedValue.value };
            saveData(data);
            editingOptionIndex = -1;
            renderOptionTable();
            showToast('「' + label + '」を更新しました');
          }
        }

        /* ═══════════════════ 単価マスタ ═══════════════════ */
        function renderPriceTable() {
          var tbody = document.getElementById('price-tbody');
          var items = data.priceMaster;

          if (items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="padding:20px 12px;text-align:center;color:var(--color-text-sub);">単価マスタが登録されていません</td></tr>';
            return;
          }

          tbody.innerHTML = items.map(function (item) {
            if (item.id === editingPriceId) {
              return (
                '<tr>' +
                '<td>' + escapeHtml(item.name) + '</td>' +
                '<td class="col-right"><input type="number" min="1" step="1" class="cell-input" id="edit-price-value" style="text-align:right;" value="' + item.unitPrice + '" /></td>' +
                '<td class="col-actions">' +
                '<button type="button" class="btn btn-primary" data-action="save-price" data-id="' + item.id + '">保存</button>' +
                '<button type="button" class="btn btn-ghost" data-action="cancel-price">キャンセル</button>' +
                '</td>' +
                '</tr>'
              );
            }
            return (
              '<tr>' +
              '<td>' + escapeHtml(item.name) + '</td>' +
              '<td class="col-right">' + fmtYen(item.unitPrice) + '</td>' +
              '<td class="col-actions"><button type="button" class="btn btn-outline" data-action="edit-price" data-id="' + item.id + '">編集</button></td>' +
              '</tr>'
            );
          }).join('');
        }

        function handlePriceTableClick(e) {
          var btn = e.target.closest ? e.target.closest('button[data-action]') : null;
          if (!btn) return;
          var action = btn.getAttribute('data-action');

          if (action === 'edit-price') {
            editingPriceId = btn.getAttribute('data-id');
            renderPriceTable();
            var field = document.getElementById('edit-price-value');
            if (field) { field.focus(); field.select(); }
            return;
          }

          if (action === 'cancel-price') {
            editingPriceId = null;
            renderPriceTable();
            return;
          }

          if (action === 'save-price') {
            var id = btn.getAttribute('data-id');
            var field = document.getElementById('edit-price-value');
            var raw = Number(field.value);

            if (!isFinite(raw) || raw < 1 || Math.floor(raw) !== raw) {
              showToast('単価は1円以上の整数で入力してください', true);
              field.focus();
              return;
            }

            var item = data.priceMaster.filter(function (p) { return p.id === id; })[0];
            item.unitPrice = raw;
            saveData(data);
            editingPriceId = null;
            renderPriceTable();
            showToast('「' + item.name + '」の基準単価を更新しました');
          }
        }

        /* ═══════════════════ タブ切り替え ═══════════════════ */
        function initTabs() {
          var tabButtons = [
            { btn: document.getElementById('tab-btn-pulldown'), panel: document.getElementById('tab-panel-pulldown') },
            { btn: document.getElementById('tab-btn-price'), panel: document.getElementById('tab-panel-price') }
          ];

          tabButtons.forEach(function (entry) {
            entry.btn.addEventListener('click', function () {
              tabButtons.forEach(function (other) {
                var isActive = other === entry;
                other.btn.classList.toggle('active', isActive);
                other.btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
                other.panel.classList.toggle('active', isActive);
              });
            });
          });
        }

        /* ═══════════════════ 初期化 ═══════════════════ */
        var initialized = false;
        function initAdmin() {
          if (initialized) return;
          initialized = true;

          renderCategorySelect();
          renderOptionTable();
          renderPriceTable();
          initTabs();

          document.getElementById('category-select').addEventListener('change', function (e) {
            currentCategoryKey = e.target.value;
            editingOptionIndex = -1;
            document.getElementById('add-option-error').classList.remove('show');
            renderOptionTable();
          });

          document.getElementById('add-option-form').addEventListener('submit', handleAddOption);
          document.getElementById('option-tbody').addEventListener('click', handleOptionTableClick);
          document.getElementById('price-tbody').addEventListener('click', handlePriceTableClick);

          document.getElementById('logout-btn').addEventListener('click', function () {
            sessionStorage.removeItem(AUTH_KEY);
            location.reload();
          });
        }
      })();
    </script>
  </body>
</html>
